name: mustard_seed
description: "Hardal Tanesi — Günlük Kur'an İlhamı"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  shared_preferences: ^2.2.3

  # Routing
  go_router: ^14.6.2

  # Backend
  supabase_flutter: ^2.6.0

  # Kilit ekranı / ana ekran widget köprüsü
  home_widget: ^0.7.0

  # Widget'a dokununca uygulamayı belirli bir ekrana yönlendirmek için
  app_links: ^6.3.2

  # Tipografi (Inter fontu için — pubspec'e font dosyası eklemeden kullanmayı sağlar)
  google_fonts: ^6.2.1

  # Sesli mod — zikir ifadelerini Arapça sesli okutmak için
  flutter_tts: ^4.2.0

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.3
  path_provider: ^2.1.6
  http: ^1.6.0
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/