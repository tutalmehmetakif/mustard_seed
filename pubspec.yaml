name: mustard_seed
description: "Hardal Tanesi — Günlük Kur'an İlhamı"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Routing
  go_router: ^14.6.2

  # Backend
  supabase_flutter: ^2.6.0

  # Tipografi (Inter fontu için — pubspec'e font dosyası eklemeden kullanmayı sağlar)
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/